name: Deploy

on:
  workflow_run:
    workflows: ["CI", "Tests"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy
        run: |
          cd ~/sportdata
          git pull origin main
          docker compose up -d --build
          docker system prune -f
