name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Lint api-gateway
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: api-gateway

      - name: Lint etl-service
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: etl-service

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Test api-gateway
        working-directory: api-gateway
        run: go test ./... -v

      - name: Test etl-service
        working-directory: etl-service
        run: go test ./... -v

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: false

      - name: Build etl-service
        uses: docker/build-push-action@v5
        with:
          context: ./etl-service
          push: false

      - name: Build frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
