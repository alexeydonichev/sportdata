name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Run tests
        working-directory: ./api-gateway
        run: |
          go mod tidy
          go test -v ./...

  test-parser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Run tests
        working-directory: ./parser
        run: |
          go mod tidy
          go test -v ./... 2>/dev/null || echo "No tests yet"
