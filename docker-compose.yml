services:
  postgres:
    image: postgres:16-alpine
    container_name: sportdata-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sportdata}
      POSTGRES_USER: ${POSTGRES_USER:-sportdata_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sportdata_admin} -d ${POSTGRES_DB:-sportdata}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - sportdata-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: sportdata-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sportdata-net
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 64M

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: sportdata-api-gateway
    volumes:
      - ./migrations:/app/migrations:ro
      - /var/www/sportdata/uploads:/app/uploads
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sportdata_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sportdata}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      PASETO_SECRET_KEY: ${PASETO_SECRET_KEY}
      JWT_SECRET: ${PASETO_SECRET_KEY}
      JWT_EXPIRY_HOURS: ${JWT_EXPIRY_HOURS:-24}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ETL_SECRET: ${ETL_SERVICE_SECRET}
      ETL_SERVICE_URL: http://etl-worker:8081
      API_GATEWAY_URL: http://api-gateway:8080
      GIN_MODE: release
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://stridepax.tech}
      PORT: "8080"
      SUPERADMIN_EMAIL: ${SUPERADMIN_EMAIL}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
      SUPERADMIN_TOTP_SECRET: ${SUPERADMIN_TOTP_SECRET}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      MIGRATIONS_DIR: /app/migrations
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sportdata-net
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

  etl-worker:
    build:
      context: ./etl-service
      dockerfile: Dockerfile
    container_name: sportdata-etl
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sportdata_admin}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sportdata}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ETL_SECRET: ${ETL_SERVICE_SECRET}
      ETL_LISTEN: ":8081"
      SYNC_INTERVAL: "6h"
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sportdata-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 64M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: sportdata-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-SportData}
      NEXT_PUBLIC_API_URL: https://stridepax.tech
      CORS_ORIGINS: https://stridepax.tech
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sportdata-net
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 128M

  prometheus:
    image: prom/prometheus:latest
    container_name: sportdata-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "127.0.0.1:9090:9090"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    networks:
      - sportdata-net

  grafana:
    image: grafana/grafana:latest
    container_name: sportdata-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-SportData2024!}
      GF_SERVER_ROOT_URL: https://stridepax.tech/grafana/
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    volumes:
      - grafana_data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 64M
    networks:
      - sportdata-net

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  grafana_data:
    driver: local
  prometheus_data:
    driver: local

networks:
  sportdata-net:
    driver: bridge
